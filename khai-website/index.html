<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - Khairunnabilah</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400;0,700;1,400&family=Poppins:wght=400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fce79a; 
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }
        
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            z-index: 5;
        }

        .floral-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .flower-cluster {
            position: absolute;
        }

      
        .flower-top {
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            min-width: 600px;
            opacity: 0.95;
        }

        
        .flower-left {
            top: 15%;
            left: -80px;
            width: 32%;
            min-width: 350px;
            opacity: 0.9;
        }

        
        .flower-bottom-right {
            bottom: -30px;
            right: -5px;
            width: 40%;
            min-width: 420px;
            opacity: 0.95;
        }

        .navbar {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            width: auto;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links li a {
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff; 
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding: 12px 30px;
            background-color: #ce2a2b; 
            border-radius: 50px;
            box-shadow: 0px 6px 12px rgba(206, 42, 43, 0.3); 
            display: inline-block;
            text-align: center;
        }

        .nav-links li a:hover {
            background-color: #b32021; 
            transform: translateY(-3px);
            box-shadow: 0px 8px 16px rgba(206, 42, 43, 0.4);
        }

        .hero-content {
            max-width: 700px;
            z-index: 10;
            margin-top: 60px;
            text-align: left;
            position: relative;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.8rem; 
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 25px;
            color: #ce2a2b; 
            
            text-shadow: 
                4px 4px 0px #fce79a, 
                -2px -2px 0px #fce79a,  
                 2px -2px 0px #fce79a,
                -2px  2px 0px #fce79a,
                 2px  2px 0px #fce79a,
                0px 10px 20px rgba(0, 0, 0, 0.08);
        }

        .hero-content p {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.8;
            color: #1a1a1a;
            max-width: 560px; 
            background-color: rgba(253, 237, 175, 0.92); 
            padding: 22px 28px;
            border-radius: 12px;
            border: 2px solid #ce2a2b;
            box-shadow: 6px 6px 0px #ce2a2b; 
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px); 
        }

       
        @media (max-width: 1024px) {
            .flower-top { width: 80%; }
            .flower-left { width: 35%; left: -100px; }
            .flower-bottom-right { width: 45%; }
            .hero-content h1 { font-size: 3.8rem; }
        }

        @media (max-width: 768px) {
            .navbar { width: 92%; top: 20px; }
            .nav-links { gap: 10px; flex-wrap: wrap; justify-content: center; }
            .nav-links li a { font-size: 11px; padding: 8px 16px; }
            .hero { 
                padding: 0 5%; 
                justify-content: center; 
            }
            .hero-content { text-align: center; margin-top: 140px; }
            .hero-content h1 { font-size: 2.6rem; margin-bottom: 20px; }
            .hero-content p { font-size: 12px; padding: 18px; text-align: justify; box-shadow: 4px 4px 0px #ce2a2b; }
            
           
            .flower-top { width: 100%; top: -50px; }
            .flower-left { width: 50%; opacity: 0.4; left: -80px; }
            .flower-bottom-right { width: 60%; opacity: 0.5; }
        }
    </style>
</head>
